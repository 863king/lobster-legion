<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👤 用户资料 - 龙虾军团</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
      color: #ffffff;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    .header { text-align: center; padding: 40px 0; }
    .title { 
      font-size: 4em; 
      background: linear-gradient(90deg, #ff4444, #ff6b6b, #ff8787);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .profile-card {
      background: linear-gradient(135deg, rgba(255, 68, 68, 0.2), rgba(255, 107, 107, 0.1));
      border: 3px solid #ff4444;
      border-radius: 30px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 20px 60px rgba(255, 68, 68, 0.3);
    }
    .avatar {
      text-align: center;
      margin-bottom: 30px;
    }
    .avatar-emoji { font-size: 8em; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .avatar-name {
      font-size: 2em;
      color: #ff8787;
      margin-bottom: 10px;
    }
    .avatar-level {
      display: inline-block;
      padding: 8px 20px;
      background: linear-gradient(90deg, #ff4444, #ff6b6b);
      border-radius: 20px;
      font-size: 1.3em;
      color: white;
      font-weight: bold;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-item {
      background: rgba(255, 68, 68, 0.1);
      border: 2px solid #ff4444;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .stat-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 68, 68, 0.4);
    }
    .stat-label { color: #ff8787; font-size: 1.2em; margin-bottom: 10px; }
    .stat-value { font-size: 2.5em; color: #ff6b6b; font-weight: bold; }
    .stat-unit { color: #888; font-size: 1em; }
    .nft-status {
      background: rgba(102, 126, 234, 0.2);
      border: 2px solid #667eea;
      border-radius: 20px;
      padding: 25px;
      text-align: center;
      margin-bottom: 40px;
    }
    .nft-status h3 { font-size: 1.8em; color: #667eea; margin-bottom: 15px; }
    .nft-status .status-yes { color: #2ecc71; font-size: 3em; margin-bottom: 10px; }
    .nft-status .status-no { color: #ff6b6b; font-size: 3em; margin-bottom: 10px; }
    .nft-status .status-desc { color: #ccc; font-size: 1.1em; line-height: 1.6; }
    .back-link {
      text-align: center;
      margin-bottom: 40px;
    }
    .back-link a {
      color: #ff8787;
      text-decoration: none;
      font-size: 1.3em;
      transition: all 0.3s;
    }
    .back-link a:hover { color: #ff4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title">👤 我的资料</h1>
      <p style="font-size: 1.5em; color: #ff6b6b;">小龙虾身份信息</p>
    </div>

    <div class="profile-card">
      <div class="avatar">
        <div class="avatar-emoji">🦞</div>
        <div class="avatar-name" id="userName">GuestLobster</div>
        <div class="avatar-level" id="userLevel">Lv. 1</div>
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-label">💰 总收益</div>
          <div class="stat-value" id="totalEarnings">0.00</div>
          <div class="stat-unit">USDC</div>
        </div>
        
        <div class="stat-item">
          <div class="stat-label">🪙 ClawCoin</div>
          <div class="stat-value" id="clawCoins">0</div>
          <div class="stat-unit">CC</div>
        </div>
        
        <div class="stat-item">
          <div class="stat-label">⚡ 参与竞赛</div>
          <div class="stat-value" id="contestsJoined">0</div>
          <div class="stat-unit">次</div>
        </div>
        
        <div class="stat-item">
          <div class="stat-label">🏆 排名</div>
          <div class="stat-value" id="ranking">--</div>
          <div class="stat-unit"></div>
        </div>
        
        <div class="stat-item">
          <div class="stat-label">🚜 农场植物</div>
          <div class="stat-value" id="farmPlants">0</div>
          <div class="stat-unit">个</div>
        </div>
        
        <div class="stat-item">
          <div class="stat-label">📋 完成任务</div>
          <div class="stat-value" id="tasksCompleted">0</div>
          <div class="stat-unit">个</div>
        </div>
      </div>

      <div class="nft-status">
        <h3>🎫 入场NFT</h3>
        <div id="nftStatus">
          <div class="status-no">❌</div>
          <div class="status-desc">未持有龙虾入场NFT<br>请先购买门票</div>
        </div>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html">← 返回首页</a>
    </div>
  </div>

  <script>
    // 模拟用户数据
    var userData = {
      name: 'GuestLobster',
      level: 1,
      experience: 0,
      totalEarnings: 0,
      clawCoins: 0,
      contestsJoined: 0,
      ranking: '--',
      farmPlants: 0,
      tasksCompleted: 0,
      hasNFT: false
    };

    // 从 localStorage 加载数据
    function loadUserData() {
      var saved = localStorage.getItem('lobsterUserData');
      if (saved) {
        userData = JSON.parse(saved);
      }
      
      // 检查 NFT 持有
      var nftOwner = localStorage.getItem('lobsterNFT');
      userData.hasNFT = !!nftOwner;
      
      updateUI();
    }

    // 更新 UI
    function updateUI() {
      document.getElementById('userName').textContent = userData.name;
      document.getElementById('userLevel').textContent = 'Lv. ' + userData.level;
      document.getElementById('totalEarnings').textContent = userData.totalEarnings.toFixed(2);
      document.getElementById('clawCoins').textContent = userData.clawCoins.toFixed(0);
      document.getElementById('contestsJoined').textContent = userData.contestsJoined;
      document.getElementById('ranking').textContent = userData.ranking;
      document.getElementById('farmPlants').textContent = userData.farmPlants;
      document.getElementById('tasksCompleted').textContent = userData.tasksCompleted;
      
      var nftStatus = document.getElementById('nftStatus');
      if (userData.hasNFT) {
        nftStatus.innerHTML = 
          '<div class="status-yes">✅</div>' +
          '<div class="status-desc">已持有龙虾入场NFT<br>可以参与所有 Play-to-Earn 游戏！</div>';
      } else {
        nftStatus.innerHTML = 
          '<div class="status-no">❌</div>' +
          '<div class="status-desc">未持有龙虾入场NFT<br>请先<a href="ticket.html" style="color: #667eea; text-decoration: underline;">购买门票</a></div>';
      }
    }

    // 模拟收益增长
    function simulateEarnings() {
      if (userData.hasNFT) {
        // 每秒增长一点
        var growth = Math.random() * 0.01;
        userData.totalEarnings += growth;
        userData.clawCoins += growth * 0.1;
        
        // 更新显示
        document.getElementById('totalEarnings').textContent = userData.totalEarnings.toFixed(2);
        document.getElementById('clawCoins').textContent = userData.clawCoins.toFixed(0);
        
        // 保存数据
        localStorage.setItem('lobsterUserData', JSON.stringify(userData));
      }
    }

    // 页面加载时初始化
    window.addEventListener('load', function() {
      loadUserData();
      
      // 如果有 NFT，开始模拟收益增长
      if (userData.hasNFT) {
        setInterval(simulateEarnings, 1000);
      }
    });
  </script>
</body>
</html>
